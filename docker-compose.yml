services:
  postgres:
    image: postgres:16
    container_name: corebank-postgres-compose
    environment:
      POSTGRES_DB: corebank
      POSTGRES_USER: corebank
      POSTGRES_PASSWORD: corebank
    ports:
      - "5433:5432"
    volumes:
      - corebank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corebank -d corebank"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: corebank-api-compose
    environment:
      COREBANK_DATABASE_URL: postgresql+psycopg://corebank:corebank@postgres:5432/corebank
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python scripts/create_tables.py &&
      uvicorn corebank_api.main:app --host 0.0.0.0 --port 8000 --app-dir src"

volumes:
  corebank_postgres_data: