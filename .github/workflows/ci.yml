name: CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: corebank
          POSTGRES_USER: corebank
          POSTGRES_PASSWORD: corebank
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U corebank -d corebank"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      COREBANK_DATABASE_URL: postgresql+psycopg://corebank:corebank@localhost:5433/corebank
      PYTHONPATH: apps/api/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run lint
        run: make lint

      - name: Verify migration upgrade path
        run: |
          alembic -c apps/api/alembic.ini upgrade 6d4e2a91c8b7
          alembic -c apps/api/alembic.ini upgrade head

      - name: Run tests
        run: make test

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --prefix apps/web
      - run: pip install -r apps/api/requirements.txt
      - run: PYTHONPATH=apps/api/src python apps/api/scripts/export_openapi.py apps/web/openapi.json
      - run: npm run generate:api --prefix apps/web
      - run: git diff --exit-code -- apps/web/openapi.json apps/web/src/generated/api-schema.ts
      - run: npm test --prefix apps/web
      - run: npm run build --prefix apps/web

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --prefix apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: make https-cert
      - run: docker compose up -d --build
      - name: Run browser tests
        run: npm run test:e2e --prefix apps/web
      - name: Show service logs
        if: failure()
        run: docker compose logs
      - name: Stop services
        if: always()
        run: docker compose down -v
